  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: API Key authentication using Bearer token
paths:
  /api/v1/document/retrieve:
    post:
      tags:
        - Document Service
      operationId: tenovos.document.DocumentService.Retrieve
      description: >-
        Retrieves one or more documents by internal ID or external ID, with
        optional field projection and soft-delete inclusion.


        Request:

        ids               - List of internal document IDs to retrieve.

        external_ids      - List of external IDs to retrieve documents by.

        fetches           - Optional field projection expression limiting which
        document fields are returned.

        include_deleted   - When true, includes soft-deleted documents in the
        results.


        Response:

        documents   - List of Document objects (id, kind, doc body, timestamps).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenovos_document_Document_Retrieve_Request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/tenovos_document_Document_Retrieve_Response
        '400':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '403':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Error
          content:
