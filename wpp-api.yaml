      security:
        - bearerAuth: []
  /api/v1/document/link:
    post:
      tags:
        - Document Service
      operationId: tenovos.document.DocumentService.Link
      description: >-
        Creates directional links from a source document to one or more
        destination documents at a specified property path.


        Request:

        source_id         - ID of the document to link from.

        dest_ids          - List of destination document IDs to link to.

        property_path     - The field path on the source document that
        represents this relationship.

        dest_properties   - Optional per-destination properties. Each entry
        specifies dest_id and an

        optional weight used for ordering or scoring the relationship.


        Response:

        dest_ids   - IDs of the destination documents that were successfully
        linked.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenovos_document_Document_Link_Request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenovos_document_Document_Link_Response'
