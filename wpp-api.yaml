                properties:
                  message:
                    type: string
      security:
        - bearerAuth: []
  /api/v1/document/list:
    post:
      tags:
        - Document Service
      operationId: tenovos.document.DocumentService.List
      description: >-
        Lists documents filtered by one or more kind names, with optional field
        projection and cursor-based pagination.


        Request:

        kinds             - List of Kind names to filter by.

        fetches           - Optional field projection expression limiting which
        document fields are returned.

        include_deleted   - When true, includes soft-deleted documents in the
        results.

        pagination        - Optional Pagination cursor and page size.


        Response:

        documents     - List of Document objects matching the filter.

        page_cursor   - Opaque cursor for the next page. Absent when there are
        no further results.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenovos_document_Document_List_Request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenovos_document_Document_List_Response'
        '400':
          description: Error
          content:
            application/json:
              schema:
                type: object
