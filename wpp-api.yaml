            - $ref: '#/components/schemas/google_protobuf_NullValue'
            - type: number
              format: double
            - type: string
              description: Rule data fields
            - type: boolean
            - $ref: '#/components/schemas/google_protobuf_Struct'
            - $ref: '#/components/schemas/google_protobuf_ListValue'
        created_dt:
          $ref: '#/components/schemas/google_protobuf_Timestamp'
        updated_dt:
          $ref: '#/components/schemas/google_protobuf_Timestamp'
        deleted_dt:
          $ref: '#/components/schemas/google_protobuf_Timestamp'
