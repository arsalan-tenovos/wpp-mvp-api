              description: Rule data fields
            - type: integer
              format: int64
    tenovos_document_Document_List_Response:
      type: object
      properties:
        documents:
          items:
            $ref: '#/components/schemas/tenovos_document_Document'
          type: array
        page_cursor:
          type: string
          description: Rule data fields
    tenovos_document_Document_Link_Request:
      type: object
      properties:
        source_id:
          type: string
          description: Rule data fields
        dest_ids:
          items:
            type: string
            description: Rule data fields
          type: array
        property_path:
          type: string
          description: Rule data fields
        dest_properties:
