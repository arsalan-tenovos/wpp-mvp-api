          type: string
          description: Rule data fields
        uri:
          type: string
          description: Rule data fields
        representation_type:
          type: string
          description: Rule data fields
        content_properties:
          oneOf:
            - $ref: '#/components/schemas/tenovos_content_ContentProperties_Image'
            - $ref: '#/components/schemas/tenovos_content_ContentProperties_Video'
            - $ref: '#/components/schemas/tenovos_content_ContentProperties_Document'
            - type: string
              description: Rule data fields
            - type: integer
              format: int64
            - type: string
              description: Rule data fields
            - type: string
              description: Rule data fields
        external_id:
          type: string
          description: Rule data fields
        extended_properties:
          oneOf:
            - $ref: >-
                #/components/schemas/tenovos_content_ExtendedProperties_Description
            - $ref: >-
                #/components/schemas/tenovos_content_ExtendedProperties_ExtendedDescription
            - $ref: >-
                #/components/schemas/tenovos_content_ExtendedProperties_Technical
