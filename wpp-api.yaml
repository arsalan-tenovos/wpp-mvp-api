openapi: 3.0.0
info:
  version: 0.0.2
  description: >-
    Teneovos REST API gateway. It dynamically proxies REST requests to backend services. Limited to features enabled for WPP Open MVP.
  title: Tenovos REST API
servers:
  - description: Default Server
    url: https://dev-api.tenovos.net
  - description: Prod Server
    url: https://api.tenovos.net
components:
  schemas:
    tenovos_document_Document_Retrieve_Request:
      type: object
      properties:
        ids:
          items:
            type: string
            description: Rule data fields
          type: array
        fetches:
          type: string
          description: Rule data fields
        include_deleted:
          type: boolean
        external_ids:
          items:
            type: string
            description: Rule data fields
          type: array
    tenovos_document_Document_Retrieve_Response:
      type: object
      properties:
        documents:
          items:
            $ref: '#/components/schemas/tenovos_document_Document'
          type: array
