      tags:
        - Document Service
      operationId: tenovos.document.DocumentService.Retrieve
      description: >-
        Retrieves one or more documents by internal ID or external ID, with
        optional field projection and soft-delete inclusion.


        Request:

        ids               - List of internal document IDs to retrieve.

        external_ids      - List of external IDs to retrieve documents by.

        fetches           - Optional field projection expression limiting which
        document fields are returned.

        include_deleted   - When true, includes soft-deleted documents in the
        results.


        Response:

