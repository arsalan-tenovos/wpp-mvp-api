paths:
  /api/v1/document/create:
    post:
      tags:
        - Document Service
      operationId: tenovos.document.DocumentService.Create
      description: >-
        Creates one or more documents of a given kind, returning the IDs of
        newly created documents and any pre-existing duplicates.


        Request:

        documents     - List of documents to create. Each entry includes:

        kind        - The Kind name this document belongs to.

        doc         - The document body as an arbitrary JSON value.

        external_id - Optional identifier from an external system for
        deduplication and cross-reference.


        Response:

        ids            - IDs of the newly created documents.

        existing_ids   - IDs of pre-existing documents that matched by
        external_id (not re-created).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenovos_document_Document_Create_Request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenovos_document_Document_Create_Response'
        '400':
          description: Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
