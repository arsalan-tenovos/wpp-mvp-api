  /api/v1/transform/submit:
    post:
      tags:
        - Transform Service
      operationId: tenovos.transform.TransformService.Submit
      description: >-
        Submits one or more media transformation jobs for asynchronous
        processing.


        Request:

        jobs   - List of Job definitions to submit. Each Job includes:

        content_source   - The input media, specified as either a url or a
        content_id.

        name             - Human-readable name for the job.

        tasks            - Ordered list of Task operations to execute. Each Task
        specifies:

        input_content_label  - Optional label to chain output from a prior task
        as input.

        output_content_label - Optional label to reference this task's output in
        later tasks.

        details              - One of:

        Delivery      - Destination for the transformed output (S3 or
        ContentService).

        ImageTransform   - Scale, color space conversion, or format change for
        images.

        VideoTranscoding - Transcode video with codec, bitrate, resolution,
        poster,

        transcription, and keyframe montage options.

        DocumentTransform - Extract a poster image or text from a document.

        notification     - Optional webhook URL to notify when the job
        completes.

        correlation_id   - Optional caller-supplied ID for correlating jobs with
        external systems.


        Response:

        jobs   - List of JobStatusResponse objects, one per submitted job, each
        containing

        the assigned job id and initial status (QUEUED or PENDING).
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenovos_transform_Submit_Request'
      responses:
        '200':
          description: OK
          content:
